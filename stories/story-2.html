      <section class="card story-content">
        <p>
          BB탄 총이었다. 그래서 꼬마 덜렁이는 어떻게 할지 한참 고민했다. '엄마 카드로 사면 엄마가 바로
          알아차릴 테고... 내 현금은 통장에 있어. 그럼 방법은 하나, 아무도 없을 때 훔치는거야!' 결국
          꼬마 덜렁이는 바보같은 방법을 선택했다. 그리고 직원이 잠깐 자리를 비운 사이, 총을 훔쳐서 마트를
          뛰쳐나왔다. 꼬마 덜렁이는 부모님께 뭐라고 변명할지 고민하며 집으로 갔다.
        </p>
